<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parco Auto Piccirillo - Duranti</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --g0: #e8f5ee; --g1: #f2faf5; --g2: #d4edde; --g3: #b8dfc8;
    --g4: #1f7a40; --g5: #196b37; --g6: #145c2e; --g7: #145c2e; --g8: #0f4522;
    --warn: #c86800; --danger: #b03020; --ok: #1a7a3c;
    --text: #0d2218; --text-dim: #2e5c3e; --text-muted: #5a9470;
    --border: #9ecfb2; --card: #f5fbf7; --card2: #e4f3eb;
    --modal-bg: rgba(160,210,180,0.55); --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--g0); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(100,190,140,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 80%, rgba(130,200,160,0.20) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(100,180,130,0.1) 39px, rgba(100,180,130,0.1) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(100,180,130,0.1) 39px, rgba(100,180,130,0.1) 40px);
  }
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px 18px; border-bottom: 1px solid var(--border);
    background: rgba(225,245,233,0.96); backdrop-filter: blur(12px); gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { width: 42px; height: 42px; background: linear-gradient(135deg, var(--g4), var(--g6)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 16px rgba(56,176,101,0.25); }
  .header-title h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; color: var(--text); }
  .header-title p { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; letter-spacing: 0.5px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  /* STATUS DOT */
  .db-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .db-dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; transition: background 0.3s; }
  .db-dot.online { background: var(--ok); box-shadow: 0 0 6px rgba(26,122,60,0.5); }
  .db-dot.offline { background: var(--danger); }
  .db-dot.loading { background: var(--warn); animation: pulse-dot 1s ease infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  /* ALERT */
  #alert-banner { position: relative; z-index: 9; display: none; padding: 10px 32px; background: linear-gradient(90deg, rgba(192,57,43,0.08), rgba(192,57,43,0.03)); border-bottom: 1px solid rgba(192,57,43,0.2); }
  #alert-banner.show { display: block; }
  .alert-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .alert-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500; animation: pulse-alert 2s ease infinite; }
  .alert-pill.danger { background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.4); color: #c0392b; }
  .alert-pill.warn   { background: rgba(224,123,0,0.12); border: 1px solid rgba(224,123,0,0.4); color: #e07b00; }
  @keyframes pulse-alert { 0%,100%{opacity:1} 50%{opacity:0.7} }
  /* LOADING OVERLAY */
  #loading-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(247,251,248,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.3s; }
  #loading-overlay.hide { opacity: 0; pointer-events: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--g3); border-top-color: var(--g4); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); }
  /* LAYOUT */
  .container { position: relative; z-index: 1; padding: 24px 32px; }
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; cursor: pointer; user-select: none; }
  .stat-card:hover { border-color: var(--g4); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(45,140,80,0.12); }
  .stat-card .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'DM Mono', monospace; }
  .stat-card .value { font-size: 26px; font-weight: 700; font-family: 'DM Serif Display', serif; }
  .stat-card .sub { font-size: 10px; color: var(--text-muted); }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap::before { content: '⌕'; position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 16px; pointer-events: none; z-index: 1; }
  .search-box { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 14px 9px 36px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .search-box:focus { border-color: var(--g5); }
  .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--text-dim); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: 'Outfit', sans-serif; transition: all 0.2s; white-space: nowrap; }
  .filter-btn:hover, .filter-btn.active { background: var(--g3); border-color: var(--g5); color: var(--text); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; white-space: nowrap; }
  .btn-primary { background: linear-gradient(135deg, var(--g4), var(--g6)); color: #fff; box-shadow: 0 4px 14px rgba(56,176,101,0.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(56,176,101,0.4); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { border-color: var(--g5); color: var(--text); background: var(--g3); }
  .btn-danger { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.35); color: var(--danger); }
  .btn-danger:hover { background: rgba(192,57,43,0.18); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 18px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-dim); background: transparent; border: none; transition: all 0.2s; position: relative; bottom: -1px; font-family: 'Outfit', sans-serif; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--g4); border: 1px solid var(--border); border-bottom: 1px solid var(--card); background: var(--card); font-weight:600; }
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #cce8d8; border-bottom: 1px solid var(--border); }
  thead th { padding: 12px 14px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); font-family: 'DM Mono', monospace; font-weight: 400; white-space: nowrap; cursor: pointer; }
  thead th:hover { color: var(--g6); }
  tbody tr { border-bottom: 1px solid rgba(194,222,206,0.5); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(45,140,80,0.06); }
  td { padding: 11px 14px; font-size: 13px; vertical-align: middle; }
  .td-group { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .td-veicolo { font-weight: 600; color: var(--text); }
  .td-targa { font-family: 'DM Mono', monospace; font-size: 12px; background: rgba(45,140,80,0.1); border: 1px solid rgba(45,140,80,0.25); padding: 3px 8px; border-radius: 4px; color: var(--g6); display: inline-block; }
  .td-intestatario { color: var(--text-dim); font-size: 12px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; }
  .badge-ok     { background: rgba(26,122,60,0.1); border: 1px solid rgba(26,122,60,0.3); color: var(--ok); }
  .badge-warn   { background: rgba(224,123,0,0.1); border: 1px solid rgba(224,123,0,0.3); color: var(--warn); }
  .badge-danger { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); color: var(--danger); }
  .badge-muted  { background: rgba(122,171,138,0.2); border: 1px solid rgba(122,171,138,0.4); color: var(--text-dim); }
  .date-cell { display: flex; flex-direction: column; gap: 2px; }
  .date-cell .date-val { font-family: 'DM Mono', monospace; font-size: 12px; }
  .date-cell .date-days { font-size: 10px; }
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  tr:hover .row-actions { opacity: 1; }
  .icon-btn { width: 28px; height: 28px; border-radius: 6px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; transition: all 0.15s; background: transparent; }
  .icon-btn:hover { background: var(--g3); }
  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: var(--modal-bg); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--g1); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; transform: translateY(16px); transition: transform 0.2s; box-shadow: 0 24px 80px rgba(0,0,0,0.12); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--g6); }
  .modal-close { width: 32px; height: 32px; border-radius: 8px; background: var(--g2); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { background: var(--g3); color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .form-input, .form-select { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
  .form-input:focus, .form-select:focus { border-color: var(--g5); }
  .form-select option { background: var(--g1); }
  .form-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
  .form-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--g5); font-family: 'DM Mono', monospace; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .form-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .scadenze-list { display: flex; flex-direction: column; gap: 8px; }
  .scad-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 18px; display: flex; align-items: center; gap: 16px; transition: all 0.15s; }
  .scad-item:hover { border-color: var(--g5); }
  .scad-item.danger { border-left: 3px solid var(--danger); }
  .scad-item.warn   { border-left: 3px solid var(--warn); }
  .scad-item.ok     { border-left: 3px solid var(--ok); }
  .scad-date { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--g6); min-width: 90px; font-weight: 500; }
  .scad-type { min-width: 130px; }
  .scad-veicolo { flex: 1; }
  .scad-veicolo strong { font-weight: 600; }
  .scad-veicolo small { color: var(--text-dim); font-size: 11px; font-family: 'DM Mono', monospace; }
  .scad-days { font-family: 'DM Mono', monospace; font-size: 12px; text-align: right; min-width: 80px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #d4edde; }
  ::-webkit-scrollbar-thumb { background: #7abf96; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--g4); }
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; background: var(--g4); border: 1px solid var(--g5); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; transform: translateY(80px); opacity: 0; transition: all 0.3s; pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  #toast.show { transform: translateY(0); opacity: 1; }
  .confirm-modal { max-width: 380px; }
  .confirm-text { color: var(--text-dim); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
  @media (max-width: 768px) { header { padding: 14px 16px; } .container { padding: 16px; } .form-grid { grid-template-columns: 1fr; } table { font-size: 12px; } td, th { padding: 8px 10px; } }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Connessione al database...</div>
</div>

<header>
  <div class="header-left">
    <div class="logo">🚗</div>
    <div class="header-title">
      <h1>Parco Auto Piccirillo – Duranti</h1>
      <p id="last-update">CARICAMENTO...</p>
    </div>
  </div>
  <div class="header-right">
    <div class="db-status"><div class="db-dot loading" id="db-dot"></div><span id="db-label">connessione...</span></div>
    <button class="btn btn-primary" onclick="openAddModal()">＋ Aggiungi Veicolo</button>
  </div>
</header>

<div id="alert-banner"><div class="alert-list" id="alert-list"></div></div>

<div class="container">
  <div class="stats-bar" id="stats-bar"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('veicoli', this)">🚗 Veicoli</button>
    <button class="tab" onclick="switchTab('scadenze', this)">📅 Scadenze</button>
    <button class="tab" onclick="switchTab('criticita', this)">⚠️ Criticità</button>
  </div>
  <div id="tab-veicoli">
    <div class="toolbar">
      <div class="search-wrap"><input type="text" class="search-box" placeholder="Cerca veicolo, targa, intestatario..." id="search-input" oninput="renderTable()"></div>
      <button class="filter-btn active" onclick="setFilter('tutti', this)">Tutti</button>
      <button class="filter-btn" onclick="setFilter('Persone Fisiche', this)">Persone Fisiche</button>
      <button class="filter-btn" onclick="setFilter('Valdent', this)">Valdent</button>
      <button class="filter-btn" onclick="setFilter('SDP Srl', this)">SDP Srl</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="sortBy('gruppo')">Gruppo ↕</th>
          <th onclick="sortBy('veicolo')">Veicolo ↕</th>
          <th>Targa</th><th>Intestatario</th>
          <th onclick="sortBy('assic_scad')">Assicurazione ↕</th>
          <th onclick="sortBy('bollo_scad')">Bollo ↕</th>
          <th onclick="sortBy('rev_scad')">Revisione ↕</th>
          <th></th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
  <div id="tab-scadenze" style="display:none">
    <div class="toolbar">
      <button class="filter-btn active" onclick="setScadFilter('tutti', this)">Tutte</button>
      <button class="filter-btn" onclick="setScadFilter('danger', this)">🔴 Urgenti</button>
      <button class="filter-btn" onclick="setScadFilter('warn', this)">🟡 In scadenza</button>
      <button class="filter-btn" onclick="setScadFilter('ok', this)">🟢 In regola</button>
    </div>
    <div class="scadenze-list" id="scadenze-list"></div>
  </div>
  <div id="tab-criticita" style="display:none">
    <div class="scadenze-list" id="criticita-list"></div>
  </div>
</div>

<!-- MODAL VEICOLO -->
<div class="modal-overlay" id="modal-veicolo">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nuovo Veicolo</div>
      <button class="modal-close" onclick="closeModal('modal-veicolo')">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Veicolo *</label><input class="form-input" id="f-veicolo" placeholder="es. Renault Clio"></div>
      <div class="form-group"><label class="form-label">Targa *</label><input class="form-input" id="f-targa" placeholder="es. EZ390JJ" style="text-transform:uppercase"></div>
      <div class="form-group"><label class="form-label">Intestatario *</label><input class="form-input" id="f-intestatario"></div>
      <div class="form-group"><label class="form-label">Gruppo</label>
        <select class="form-select" id="f-gruppo">
          <option value="Persone Fisiche">Persone Fisiche</option>
          <option value="Valdent">Valdent</option>
          <option value="SDP Srl">SDP Srl</option>
        </select>
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">🛡️ Assicurazione</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Compagnia</label><input class="form-input" id="f-assic-comp"></div>
        <div class="form-group"><label class="form-label">Ultima effettuazione</label><input class="form-input" type="date" id="f-assic-eff"></div>
        <div class="form-group"><label class="form-label">Scadenza</label><input class="form-input" type="date" id="f-assic-scad"></div>
        <div class="form-group"><label class="form-label">Stato</label>
          <select class="form-select" id="f-assic-stato">
            <option value="IN REGOLA">In regola</option><option value="IN SCADENZA">In scadenza</option>
            <option value="PAGATA">Pagata</option><option value="DA VERIFICARE">Da verificare</option><option value="SCADUTA">Scaduta</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">💳 Bollo</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Scadenza</label><input class="form-input" type="date" id="f-bollo-scad"></div>
        <div class="form-group"><label class="form-label">Stato</label>
          <select class="form-select" id="f-bollo-stato">
            <option value="OK">OK</option><option value="DA PAGARE">Da pagare</option>
            <option value="SCADUTO">Scaduto</option><option value="DA VERIFICARE">Da verificare</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">🔧 Revisione</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Ultima revisione</label><input class="form-input" type="date" id="f-rev-eff"></div>
        <div class="form-group"><label class="form-label">Prossima scadenza</label><input class="form-input" type="date" id="f-rev-scad"></div>
        <div class="form-group full"><label class="form-label">Note</label><input class="form-input" id="f-note" placeholder="Note aggiuntive..."></div>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-veicolo')">Annulla</button>
      <button class="btn btn-primary" onclick="saveVeicolo()">💾 Salva</button>
    </div>
  </div>
</div>

<!-- MODAL CONFERMA ELIMINA -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal confirm-modal">
    <div class="modal-header">
      <div class="modal-title" style="color:var(--danger)">Elimina Veicolo</div>
      <button class="modal-close" onclick="closeModal('modal-confirm')">✕</button>
    </div>
    <p class="confirm-text" id="confirm-text">Sei sicuro di voler eliminare questo veicolo?</p>
    <div class="form-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-confirm')">Annulla</button>
      <button class="btn btn-danger" onclick="confirmDelete()">🗑 Elimina</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

// ── DB STATUS ───────────────────────────────────────────
function setDbStatus(state) {
  const dot = document.getElementById('db-dot');
  const lbl = document.getElementById('db-label');
  dot.className = 'db-dot ' + state;
  lbl.textContent = state === 'online' ? 'database online' : state === 'offline' ? 'offline' : 'connessione...';
}

// ── REALTIME LISTENER ───────────────────────────────────
let seeded = false;
onSnapshot(collection(db, COL), async (snap) => {
  if (snap.empty && !seeded) {
    seeded = true;
    setDbStatus('loading');
    for (const v of SEED) {
      await setDoc(doc(db, COL, v.id), { ...v, updatedAt: serverTimestamp() });
    }
    return;
  }
  veicoli = snap.docs.map(d => ({ ...d.data(), id: d.id }));
  setDbStatus('online');
  document.getElementById('loading-overlay').classList.add('hide');
  renderAll();
}, (err) => {
  console.error(err);
  setDbStatus('offline');
  document.getElementById('loading-overlay').classList.add('hide');
});

// ── UTILITIES ───────────────────────────────────────────
function daysUntil(s) {
  if (!s || s.includes('/') || s.length < 8) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(s) - t) / 86400000);
}
function fmtDate(s) {
  if (!s || s.length < 8) return s || '—';
  const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`;
}
function statusClass(d) {
  if (d === null) return 'muted';
  if (d <= 0) return 'danger';
  if (d <= 30) return 'danger';
  if (d <= 90) return 'warn';
  return 'ok';
}
function daysLabel(d) {
  if (d === null) return '';
  if (d < 0) return `scad. ${Math.abs(d)}gg fa`;
  if (d === 0) return 'OGGI'; if (d === 1) return 'domani';
  return `fra ${d}gg`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function updateLastUpdate() {
  const d = new Date();
  const M = ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
  document.getElementById('last-update').textContent = `SYNC: ${String(d.getDate()).padStart(2,'0')} ${M[d.getMonth()]} ${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── STATS ───────────────────────────────────────────────
function renderStats() {
  const total = veicoli.length;
  let urgenti = 0, inScad = 0;
  veicoli.forEach(v => [v.assic_scad, v.bollo_scad, v.rev_scad].forEach(d => {
    const x = daysUntil(d);
    if (x !== null && x <= 30) urgenti++;
    else if (x !== null && x <= 90) inScad++;
  }));
  const critici = veicoli.filter(v => v.bollo_stato==='SCADUTO'||v.assic_stato==='SCADUTA'||v.assic_stato==='DA VERIFICARE').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card" onclick="switchTabById('veicoli')"><div class="label">Veicoli Totali</div><div class="value" style="color:var(--g4);font-weight:700">${total}</div><div class="sub">nel parco auto <span style="float:right;color:var(--g4)">→</span></div></div>
    <div class="stat-card" onclick="switchTabById('scadenze');setScadFilterById('danger')"><div class="label">Scadenze Urgenti</div><div class="value" style="color:${urgenti>0?'var(--danger)':'var(--ok)'}">${urgenti}</div><div class="sub">entro 30 giorni <span style="float:right;color:var(--g4)">→</span></div></div>
    <div class="stat-card" onclick="switchTabById('scadenze');setScadFilterById('warn')"><div class="label">In Scadenza</div><div class="value" style="color:${inScad>0?'var(--warn)':'var(--ok)'}">${inScad}</div><div class="sub">entro 90 giorni <span style="float:right;color:var(--g4)">→</span></div></div>
    <div class="stat-card" onclick="switchTabById('criticita')"><div class="label">Criticità</div><div class="value" style="color:${critici>0?'var(--danger)':'var(--ok)'}">${critici}</div><div class="sub">da risolvere <span style="float:right;color:var(--g4)">→</span></div></div>`;
}

// ── ALERTS ──────────────────────────────────────────────
function renderAlerts() {
  const alerts = [];
  veicoli.forEach(v => [
    { label:`Assic. ${v.veicolo} (${v.targa})`, date:v.assic_scad },
    { label:`Bollo ${v.veicolo} (${v.targa})`,  date:v.bollo_scad },
    { label:`Revisione ${v.veicolo} (${v.targa})`, date:v.rev_scad },
  ].forEach(c => {
    const d = daysUntil(c.date);
    if (d !== null && d >= 0 && d <= 30) alerts.push({...c, days:d, cls:'danger'});
  }));
  const banner = document.getElementById('alert-banner');
  if (!alerts.length) { banner.classList.remove('show'); return; }
  banner.classList.add('show');
  document.getElementById('alert-list').innerHTML =
    `<span style="font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-right:4px">⚡ ALERT:</span>` +
    alerts.map(a => `<span class="alert-pill ${a.cls}">⏰ ${a.label} — fra ${a.days}gg</span>`).join('');
}

// ── TABLE ───────────────────────────────────────────────
function makeDateCell(s, stato) {
  const d = daysUntil(s), cls = statusClass(d);
  const color = cls==='danger'?'var(--danger)':cls==='warn'?'var(--warn)':'var(--text-muted)';
  return `<div class="date-cell"><div class="date-val">${fmtDate(s)}</div>${d!==null?`<div class="date-days" style="color:${color}">${daysLabel(d)}</div>`:''}</div>`;
}

function renderTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let data = veicoli.filter(v => {
    if (currentFilter !== 'tutti' && v.gruppo !== currentFilter) return false;
    if (q && !`${v.veicolo} ${v.targa} ${v.intestatario} ${v.gruppo}`.toLowerCase().includes(q)) return false;
    return true;
  });
  if (sortField) data.sort((a,b) => (a[sortField]||'').localeCompare(b[sortField]||'') * sortDir);
  else {
    const gO = {'Persone Fisiche':0,'Valdent':1,'SDP Srl':2};
    data.sort((a,b) => (gO[a.gruppo]||3)-(gO[b.gruppo]||3) || a.veicolo.localeCompare(b.veicolo));
  }
  const tbody = document.getElementById('table-body');
  if (!data.length) { tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">🔍</div><p>Nessun veicolo trovato</p></div></td></tr>`; return; }
  let lastG = null;
  const gColors = {'Persone Fisiche':'#b8dfc8','Valdent':'#b8d4e0','SDP Srl':'#ddd8b8'};
  tbody.innerHTML = data.map(v => {
    let gr = '';
    if (v.gruppo !== lastG) { lastG = v.gruppo; gr = `<tr style="background:${gColors[v.gruppo]||'var(--g2)'}"><td colspan="8" style="padding:8px 14px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--g6);font-family:'DM Mono',monospace;font-weight:600">${v.gruppo}</td></tr>`; }
    return gr + `<tr>
      <td class="td-group">${v.gruppo}</td>
      <td class="td-veicolo">${v.veicolo}</td>
      <td><span class="td-targa">${v.targa}</span></td>
      <td class="td-intestatario">${v.intestatario}</td>
      <td>${makeDateCell(v.assic_scad, v.assic_stato)}</td>
      <td>${makeDateCell(v.bollo_scad, v.bollo_stato)}</td>
      <td>${makeDateCell(v.rev_scad, null)}</td>
      <td><div class="row-actions">
        <button class="icon-btn" title="Modifica" onclick="openEditModal('${v.id}')">✏️</button>
        <button class="icon-btn" title="Elimina" onclick="openDeleteModal('${v.id}')">🗑</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ── SCADENZE ────────────────────────────────────────────
function renderScadenze() {
  const items = [];
  veicoli.forEach(v => [
    {tipo:'🛡️ Assicurazione', date:v.assic_scad, stato:v.assic_stato},
    {tipo:'💳 Bollo', date:v.bollo_scad, stato:v.bollo_stato},
    {tipo:'🔧 Revisione', date:v.rev_scad, stato:null},
  ].forEach(c => {
    if (!c.date || c.date.length < 8) return;
    const d = daysUntil(c.date), cls = statusClass(d);
    if (currentScadFilter !== 'tutti' && cls !== currentScadFilter) return;
    items.push({...c, d, cls, veicolo:v.veicolo, targa:v.targa, intestatario:v.intestatario, vid:v.id});
  }));
  items.sort((a,b) => (a.date||'9999').localeCompare(b.date||'9999'));
  const el = document.getElementById('scadenze-list');
  if (!items.length) { el.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>Nessuna scadenza trovata</p></div>`; return; }
  const color = c => c==='danger'?'var(--danger)':c==='warn'?'var(--warn)':'var(--text-dim)';
  el.innerHTML = items.map(it => `<div class="scad-item ${it.cls}">
    <div class="scad-date">${fmtDate(it.date)}</div>
    <div class="scad-type"><span class="badge badge-${it.cls}">${it.tipo}</span></div>
    <div class="scad-veicolo"><strong>${it.veicolo}</strong><small> · ${it.targa} · ${it.intestatario}</small></div>
    <div class="scad-days" style="color:${color(it.cls)}">${it.d!==null?daysLabel(it.d):''}</div>
    <button class="btn btn-ghost btn-sm" onclick="openEditModal('${it.vid}')">✏️</button>
  </div>`).join('');
}

// ── CRITICITÀ ───────────────────────────────────────────
function renderCriticita() {
  const items = [];
  veicoli.forEach(v => {
    if (v.bollo_stato==='SCADUTO') items.push({tipo:'🔴 Bollo Scaduto', v, msg:v.note||'Bollo non pagato', p:0});
    if (v.assic_stato==='SCADUTA') items.push({tipo:'🔴 Assicurazione Scaduta', v, msg:'', p:0});
    if (v.assic_stato==='DA VERIFICARE') items.push({tipo:'🟡 Assicurazione da Verificare', v, msg:'Data non nota', p:1});
    const dA=daysUntil(v.assic_scad), dB=daysUntil(v.bollo_scad), dR=daysUntil(v.rev_scad);
    if (dA!==null&&dA>=0&&dA<=30) items.push({tipo:'⚠️ Assicurazione in Scadenza', v, msg:`Scade il ${fmtDate(v.assic_scad)} – fra ${dA} giorni`, p:1});
    if (dB!==null&&dB>=0&&dB<=30) items.push({tipo:'⚠️ Bollo in Scadenza', v, msg:`Scade il ${fmtDate(v.bollo_scad)} – fra ${dB} giorni`, p:1});
    if (dR!==null&&dR>=0&&dR<=15) items.push({tipo:'⚠️ Revisione in Scadenza', v, msg:`Scade il ${fmtDate(v.rev_scad)} – fra ${dR} giorni`, p:1});
    if (!v.rev_scad) items.push({tipo:'🟡 Revisione Mancante', v, msg:'Data revisione non disponibile', p:2});
  });
  items.sort((a,b) => a.p-b.p);
  const el = document.getElementById('criticita-list');
  if (!items.length) { el.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>Nessuna criticità rilevata</p></div>`; return; }
  el.innerHTML = items.map(it => {
    const cls = it.tipo.startsWith('🔴')||it.tipo.startsWith('⚠️') ? 'danger' : 'warn';
    return `<div class="scad-item ${cls}">
      <div class="scad-type"><span class="badge badge-${cls}">${it.tipo}</span></div>
      <div class="scad-veicolo"><strong>${it.v.veicolo}</strong><small> · ${it.v.targa} · ${it.v.intestatario}</small>${it.msg?`<br><small style="color:var(--text-muted)">${it.msg}</small>`:''}</div>
      <button class="btn btn-ghost btn-sm" onclick="openEditModal('${it.v.id}')">✏️ Aggiorna</button>
    </div>`;
  }).join('');
}

// ── FILTERS/SORT/TABS ───────────────────────────────────
window.setFilter = (f, btn) => { currentFilter = f; document.querySelectorAll('#tab-veicoli .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderTable(); };
window.setScadFilter = (f, btn) => { currentScadFilter = f; document.querySelectorAll('#tab-scadenze .filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderScadenze(); };
window.sortBy = (f) => { if (sortField===f) sortDir*=-1; else {sortField=f;sortDir=1;} renderTable(); };
window.switchTabById = (tab) => { const tabs=document.querySelectorAll('.tab'); const m={veicoli:0,scadenze:1,criticita:2}; if(tabs[m[tab]]) switchTab(tab,tabs[m[tab]]); };
window.setScadFilterById = (f) => { const btns=document.querySelectorAll('#tab-scadenze .filter-btn'); const m={tutti:0,danger:1,warn:2,ok:3}; if(btns[m[f]]) setScadFilter(f,btns[m[f]]); };
window.switchTab = (tab, btn) => {
  ['veicoli','scadenze','criticita'].forEach(t => document.getElementById(`tab-${t}`).style.display = t===tab?'':'none');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  if (tab==='scadenze') renderScadenze(); if (tab==='criticita') renderCriticita();
};

// ── MODAL ───────────────────────────────────────────────
window.openModal  = (id) => document.getElementById(id).classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');
function clearForm() {
  ['f-veicolo','f-targa','f-intestatario','f-assic-comp','f-assic-eff','f-assic-scad','f-bollo-scad','f-rev-eff','f-rev-scad','f-note'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-gruppo').value='Persone Fisiche';
  document.getElementById('f-assic-stato').value='IN REGOLA';
  document.getElementById('f-bollo-stato').value='OK';
}
window.openAddModal = () => { editingId=null; clearForm(); document.getElementById('modal-title').textContent='＋ Nuovo Veicolo'; openModal('modal-veicolo'); };
window.openEditModal = (id) => {
  const v = veicoli.find(x=>x.id===id); if(!v) return;
  editingId = id;
  document.getElementById('modal-title').textContent = `✏️ Modifica – ${v.veicolo} (${v.targa})`;
  document.getElementById('f-veicolo').value = v.veicolo;
  document.getElementById('f-targa').value = v.targa;
  document.getElementById('f-intestatario').value = v.intestatario;
  document.getElementById('f-gruppo').value = v.gruppo;
  document.getElementById('f-assic-comp').value = v.assic_comp||'';
  document.getElementById('f-assic-eff').value = v.assic_eff||'';
  document.getElementById('f-assic-scad').value = v.assic_scad||'';
  document.getElementById('f-assic-stato').value = v.assic_stato||'IN REGOLA';
  document.getElementById('f-bollo-scad').value = v.bollo_scad||'';
  document.getElementById('f-bollo-stato').value = v.bollo_stato||'OK';
  document.getElementById('f-rev-eff').value = v.rev_eff||'';
  document.getElementById('f-rev-scad').value = v.rev_scad||'';
  document.getElementById('f-note').value = v.note||'';
  openModal('modal-veicolo');
};
window.saveVeicolo = async () => {
  const veicolo = document.getElementById('f-veicolo').value.trim();
  const targa   = document.getElementById('f-targa').value.trim().toUpperCase();
  if (!veicolo||!targa) { showToast('⚠️ Veicolo e Targa sono obbligatori'); return; }
  const data = {
    veicolo, targa,
    intestatario: document.getElementById('f-intestatario').value.trim(),
    gruppo:       document.getElementById('f-gruppo').value,
    assic_comp:   document.getElementById('f-assic-comp').value.trim(),
    assic_eff:    document.getElementById('f-assic-eff').value,
    assic_scad:   document.getElementById('f-assic-scad').value,
    assic_stato:  document.getElementById('f-assic-stato').value,
    bollo_scad:   document.getElementById('f-bollo-scad').value,
    bollo_stato:  document.getElementById('f-bollo-stato').value,
    rev_eff:      document.getElementById('f-rev-eff').value,
    rev_scad:     document.getElementById('f-rev-scad').value,
    note:         document.getElementById('f-note').value.trim(),
    updatedAt:    serverTimestamp(),
  };
  const docId = editingId || String(Date.now());
  try {
    await setDoc(doc(db, COL, docId), data);
    showToast(editingId ? `✅ ${veicolo} aggiornato` : `✅ ${veicolo} aggiunto`);
    closeModal('modal-veicolo');
  } catch(e) { showToast('❌ Errore salvataggio: ' + e.message); }
};
window.openDeleteModal = (id) => {
  deletingId = id;
  const v = veicoli.find(x=>x.id===id);
  document.getElementById('confirm-text').textContent = `Sei sicuro di voler eliminare "${v.veicolo} (${v.targa})"? L'operazione non è reversibile.`;
  openModal('modal-confirm');
};
window.confirmDelete = async () => {
  const v = veicoli.find(x=>x.id===deletingId);
  try {
    await deleteDoc(doc(db, COL, deletingId));
    showToast(`🗑 ${v.veicolo} eliminato`);
    closeModal('modal-confirm');
  } catch(e) { showToast('❌ Errore eliminazione: ' + e.message); }
};

// Close on backdrop
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

// ── RENDER ALL ──────────────────────────────────────────
function renderAll() {
  updateLastUpdate();
  renderStats();
  renderAlerts();
  renderTable();
  const active = document.querySelector('.tab.active').textContent;
  if (active.includes('Scadenze')) renderScadenze();
  if (active.includes('Criticità')) renderCriticita();
}
</script>
</body>
